version: '3.8'

services:
  continuum:
    build: .
    ports:
      - "8080:8080"
    environment:
      - REPLICAS=150

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    depends_on:
      - prometheus